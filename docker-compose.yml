services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      
    image: vyapar-backend:latest

    container_name: vyapar-backend
    
    restart: unless-stopped 

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s



  frontend:
  
    build:
      context: ./frontend

      dockerfile: Dockerfile

      args:
      
        VITE_API_BASE_URL: /api/v1

    image: vyapar-frontend:latest

    container_name: vyapar-frontend

    restart: unless-stopped

    ports:
      - "3000:80"

    depends_on:
      backend:
        condition: service_healthy
